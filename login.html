<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In - Twist & Turn</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#101218; --bg-surface:#181B24; --ink:#F2F1ED; --ink-muted:#9297A6;
    --cube-red:#E8412B; --cube-yellow:#F2B705; --cube-blue:#2F6FE0; --cube-green:#22A35C;
  }
  body{ font-family:'Inter', sans-serif; background:var(--bg-base); color:var(--ink); }
  .font-display{ font-family:'Space Grotesk', sans-serif; }
  .surface-card{ background:var(--bg-surface); border:1px solid rgba(255,255,255,0.06); }
  .btn-primary{ background:var(--cube-red); color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:600; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .field{ background:var(--bg-base); border:1px solid rgba(255,255,255,0.12); color:var(--ink); }
  .field:focus{ outline:none; border-color:var(--cube-blue); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <span class="font-display font-bold text-2xl cursor-pointer" onclick="window.location.href='index.html'">Twist &amp; Turn</span>
      <p class="font-mono text-xs tracking-widest uppercase mt-1" style="color:var(--ink-muted);">Welcome Back</p>
    </div>

    <form id="login-form" class="surface-card rounded-2xl p-8 shadow-2xl space-y-4">
      <div>
        <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Email</label>
        <input type="email" id="email" required class="field w-full rounded-lg px-4 py-3" placeholder="you@example.com">
      </div>
      <div>
        <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Password</label>
        <input type="password" id="password" required class="field w-full rounded-lg px-4 py-3" placeholder="Your password">
      </div>

      <p id="error-msg" class="text-sm hidden" style="color:var(--cube-red);"></p>

      <button type="submit" class="btn-primary w-full py-3 rounded-lg mt-2">Log In</button>

      <p class="text-center text-sm" style="color:var(--ink-muted);">
        Don't have an account?
        <a href="signup.html" class="underline" style="color:var(--cube-blue);">Sign up</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { loginUser } from "./auth.js";

    const form = document.getElementById("login-form");
    const errorMsg = document.getElementById("error-msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await loginUser(email, password);
        window.location.href = "dashboard.html";
      } catch (err) {
        errorMsg.textContent = err.message.replace("Firebase: ", "");
        errorMsg.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
