<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Competition - Twist & Turn</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#101218; --bg-surface:#181B24; --ink:#F2F1ED; --ink-muted:#9297A6;
    --cube-red:#E8412B; --cube-yellow:#F2B705; --cube-blue:#2F6FE0; --cube-green:#22A35C;
  }
  body{ font-family:'Inter', sans-serif; background:var(--bg-base); color:var(--ink); }
  .font-display{ font-family:'Space Grotesk', sans-serif; }
  .font-mono{ font-family:'JetBrains Mono', monospace; }
  .surface-card{ background:var(--bg-surface); border:1px solid rgba(255,255,255,0.06); }
  .btn-primary{ background:var(--cube-red); color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:600; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .field{ background:var(--bg-base); border:1px solid rgba(255,255,255,0.12); color:var(--ink); }
  .field:focus{ outline:none; border-color:var(--cube-blue); }
</style>
</head>
<body class="min-h-screen">

  <!-- Password gate -->
  <div id="gate" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm surface-card rounded-2xl p-8 shadow-2xl text-center">
      <h1 class="font-display text-xl font-bold mb-4">Organizer Access</h1>
      <input type="password" id="pin-input" class="field w-full rounded-lg px-4 py-3 mb-3 text-center font-mono" placeholder="Enter PIN">
      <button id="pin-submit" class="btn-primary w-full py-3 rounded-lg">Enter</button>
      <p id="pin-error" class="text-sm mt-3 hidden" style="color:var(--cube-red);">Wrong PIN, try again.</p>
    </div>
  </div>

  <!-- Actual panel (hidden until PIN correct) -->
  <div id="panel" class="hidden">
    <nav class="sticky top-0 z-50 border-b border-white/5" style="background:rgba(16,18,24,0.9);">
      <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
        <span class="font-display font-bold text-xl cursor-pointer" onclick="window.location.href='index.html'">Twist &amp; Turn — Manage</span>
      </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-16">
      <p class="font-mono text-xs tracking-widest uppercase mb-2" style="color:var(--ink-muted);">Upcoming Competition</p>
      <h1 class="font-display text-3xl font-bold mb-8">Update Competition Details</h1>

      <div class="surface-card rounded-2xl p-8 shadow-xl space-y-4">

        <div>
          <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Status</label>
          <select id="status" class="field w-full rounded-lg px-4 py-3">
            <option value="none">No Upcoming Competition</option>
            <option value="open">Registrations Open</option>
            <option value="closed">Registrations Closed</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Competition Title</label>
          <input type="text" id="title" class="field w-full rounded-lg px-4 py-3" placeholder="Twist & Turn : Cubing Battle 2026">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Date</label>
            <input type="text" id="date" class="field w-full rounded-lg px-4 py-3" placeholder="e.g. 29–30 August 2026">
          </div>
          <div>
            <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Mode</label>
            <input type="text" id="mode" class="field w-full rounded-lg px-4 py-3" placeholder="Online Competition">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Event Type</label>
            <input type="text" id="eventType" class="field w-full rounded-lg px-4 py-3" placeholder="3×3 Cube Only">
          </div>
          <div>
            <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Entry Fee</label>
            <input type="text" id="entryFee" class="field w-full rounded-lg px-4 py-3" placeholder="₹399">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Participants Limit</label>
            <input type="text" id="participantsLimit" class="field w-full rounded-lg px-4 py-3" placeholder="Only 60">
          </div>
          <div>
            <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Format</label>
            <input type="text" id="format" class="field w-full rounded-lg px-4 py-3" placeholder="Qualifier → Top 8 → Finals">
          </div>
        </div>

        <div>
          <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Registration Link</label>
          <input type="text" id="reglink" class="field w-full rounded-lg px-4 py-3" placeholder="https://forms.gle/...">
        </div>

        <div>
          <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Extra Details / Description</label>
          <textarea id="details" rows="3" class="field w-full rounded-lg px-4 py-3" placeholder="Any extra info to show"></textarea>
        </div>

        <div>
          <label class="block text-sm font-mono mb-1" style="color:var(--ink-muted);">Poster Image</label>
          <input type="file" id="poster-file" accept="image/*" class="field w-full rounded-lg px-4 py-3">
          <div id="poster-preview" class="mt-3"></div>
        </div>

        <button id="save-btn" class="btn-primary w-full py-3 rounded-lg mt-2">Save Changes</button>
        <p id="save-msg" class="text-sm hidden"></p>
      </div>

      <p class="text-xs mt-6" style="color:var(--ink-muted);">
        Changes appear on the homepage automatically — no code editing needed.
      </p>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
    import { firebaseConfig } from "./firebase-config.js";

    // ============================================
    // CHANGE THIS PIN to whatever you want
    // ============================================
    const ADMIN_PIN = "TNT2026";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const gate = document.getElementById("gate");
    const panel = document.getElementById("panel");

    document.getElementById("pin-submit").addEventListener("click", () => {
      const val = document.getElementById("pin-input").value;
      if (val === ADMIN_PIN) {
        gate.classList.add("hidden");
        panel.classList.remove("hidden");
        loadCurrentData();
      } else {
        document.getElementById("pin-error").classList.remove("hidden");
      }
    });

    let currentPosterUrl = "";

    async function loadCurrentData() {
      const snap = await getDoc(doc(db, "site", "upcomingCompetition"));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById("status").value = d.status || "none";
        document.getElementById("title").value = d.title || "";
        document.getElementById("date").value = d.date || "";
        document.getElementById("mode").value = d.mode || "";
        document.getElementById("eventType").value = d.eventType || "";
        document.getElementById("entryFee").value = d.entryFee || "";
        document.getElementById("participantsLimit").value = d.participantsLimit || "";
        document.getElementById("format").value = d.format || "";
        document.getElementById("reglink").value = d.regLink || "";
        document.getElementById("details").value = d.details || "";
        currentPosterUrl = d.posterUrl || "";
        if (currentPosterUrl) {
          document.getElementById("poster-preview").innerHTML =
            `<img src="${currentPosterUrl}" class="rounded-lg mt-2 max-h-48">`;
        }
      }
    }

    document.getElementById("save-btn").addEventListener("click", async () => {
      const saveMsg = document.getElementById("save-msg");
      saveMsg.classList.add("hidden");

      const file = document.getElementById("poster-file").files[0];
      let posterUrl = currentPosterUrl;

      try {
        if (file) {
          const fileRef = ref(storage, "posters/" + Date.now() + "-" + file.name);
          await uploadBytes(fileRef, file);
          posterUrl = await getDownloadURL(fileRef);
        }

        await setDoc(doc(db, "site", "upcomingCompetition"), {
          status: document.getElementById("status").value,
          title: document.getElementById("title").value,
          date: document.getElementById("date").value,
          mode: document.getElementById("mode").value,
          eventType: document.getElementById("eventType").value,
          entryFee: document.getElementById("entryFee").value,
          participantsLimit: document.getElementById("participantsLimit").value,
          format: document.getElementById("format").value,
          regLink: document.getElementById("reglink").value,
          details: document.getElementById("details").value,
          posterUrl: posterUrl,
          updatedAt: new Date().toISOString()
        });

        currentPosterUrl = posterUrl;
        saveMsg.textContent = "Saved! Check your homepage.";
        saveMsg.style.color = "var(--cube-green)";
        saveMsg.classList.remove("hidden");
      } catch (err) {
        saveMsg.textContent = "Error: " + err.message;
        saveMsg.style.color = "var(--cube-red)";
        saveMsg.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
